# Production Docker Compose
# Images are built by GitHub Actions and pulled by the VPS.
# Usage: docker compose -f docker-compose.prod.yml pull
#        docker compose -f docker-compose.prod.yml up -d --no-build

name: navisha-prod

services:
  redis:
    image: redis:8-alpine
    container_name: redis-navisha
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - navisha_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  backend:
    image: ghcr.io/jhontea/navisha-backend:${IMAGE_TAG:-latest}
    container_name: navisha-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "127.0.0.1:8090:8090"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - navisha_net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    image: ghcr.io/jhontea/navisha-frontend:${IMAGE_TAG:-latest}
    container_name: navisha-frontend
    restart: unless-stopped
    environment:
      MAP_TILE_UPSTREAM_URL: ${MAP_TILE_UPSTREAM_URL:-https://basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - navisha_net
    dns:
      - 8.8.8.8
      - 1.1.1.1
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  dozzle:
    image: amir20/dozzle:latest
    container_name: navisha-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      DOZZLE_BASE: /
      DOZZLE_NO_ANALYTICS: "true"
    networks:
      - navisha_net
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  redis_data:

networks:
  navisha_net:
    driver: bridge
