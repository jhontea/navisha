# Nginx configuration for navisha.cloud
# Place at: /etc/nginx/sites-available/navisha
# Then: sudo ln -s /etc/nginx/sites-available/navisha /etc/nginx/sites-enabled/
#
# After linking, run:
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d navisha.cloud -d www.navisha.cloud -d api.navisha.cloud -d dozzle.navisha.cloud

# Frontend — navisha.cloud
server {
    server_name navisha.cloud www.navisha.cloud;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Let Certbot manage the listen directives
    listen 80;
}

# Dozzle — dozzle.navisha.cloud (Docker log viewer)
server {
    server_name dozzle.navisha.cloud;

    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_http_version 1.1;

        # WebSocket support (Dozzle uses SSE/WebSocket for live log streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Longer timeout for log streaming
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen 80;
}

# Backend API — api.navisha.cloud
server {
    server_name api.navisha.cloud;

    # AI summary generation calls an LLM that can take a few minutes for long
    # trips. Give this endpoint a much longer read timeout so nginx doesn't cut
    # the connection at 60s (which surfaced to users as a "context deadline").
    # Must be >= openrouter.timeout_seconds in backend config.yaml (currently 300).
    location ~ ^/api/v1/trips/[^/]+/summary$ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # AI trip auto-generation (F5). Generating a full multi-day itinerary with
    # an LLM can take a couple of minutes for longer trips (e.g. ~2 min for 8
    # days). Give the generate + from-draft endpoints the same long read
    # timeout as /summary so nginx doesn't cut the connection at 60s.
    # Must be >= openrouter.timeout_seconds in backend config.yaml (currently 300).
    location ~ ^/api/v1/trips/(generate|from-draft)$ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase body size limit for file uploads if needed
        client_max_body_size 10M;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    listen 80;
}
