# Nginx configuration for navisha.cloud
# Place at: /etc/nginx/sites-available/navisha
# Then: sudo ln -s /etc/nginx/sites-available/navisha /etc/nginx/sites-enabled/
#
# After linking, run:
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d navisha.cloud -d www.navisha.cloud -d api.navisha.cloud

# Frontend — navisha.cloud
server {
    server_name navisha.cloud www.navisha.cloud;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR / streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Let Certbot manage the listen directives
    listen 80;
}

# Backend API — api.navisha.cloud
server {
    server_name api.navisha.cloud;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase body size limit for file uploads if needed
        client_max_body_size 10M;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    listen 80;
}
