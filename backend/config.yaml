server:
  port: 8090

db:
  pool_size: 10
  max_conns: 25
  min_conns: 5
  max_conn_lifetime: 3600   # 1 hour in seconds
  max_conn_idle_time: 1800   # 30 minutes in seconds

redis:
  pool_size: 10
  min_idle_conns: 5

currency:
  supported: [IDR, USD, JPY, SGD, KRW, MYR, THB, EUR, VND]
  cache_ttl: 3600

location:
  geoapify_base_url: https://api.geoapify.com/v1/geocode/autocomplete
  geoapify_timeout_seconds: 8

jwt:
  access_ttl: 10800    # 3 hours
  refresh_ttl: 604800  # 7 days

# ── LLM Provider ──
# Select provider via the "provider" field or LLM_PROVIDER env var.
# Supported: "deepseek", "openrouter". Empty = fall back to openrouter: section below.
llm:
  provider: ""   # set to "deepseek" or "openrouter"
  # DeepSeek
  deepseek_model: deepseek-v4-flash
  deepseek_base_url: https://api.deepseek.com
  # OpenRouter (when provider is explicitly "openrouter")
  openrouter_model: openrouter/owl-alpha
  openrouter_base_url: https://openrouter.ai/api/v1
  # HTTP timeout (seconds) for LLM calls. Some models are slow, so keep
  # this generous. Set to 0 to use the client default (120s).
  timeout_seconds: 300
  # ── AI Daily Quota (stored in DB: app_settings.autogen_daily_quota) ──
  # All AI features (trip generate, build-around, summary) share one daily
  # counter per user. Edit via SQL, no restart needed:
  #   UPDATE app_settings SET value='20' WHERE key='autogen_daily_quota';
  # (deprecated) summary_rate_limit_seconds and generate_rate_limit_seconds
  # are replaced by the shared daily quota system.

# Legacy OpenRouter config — used as fallback when llm.provider is empty.
openrouter:
  model: openrouter/owl-alpha
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 300

# ── Rate Limiting (Phase 3D) ──
# Per-user sliding-window rate limits via Redis.
# Set enabled: false to disable all rate limiting.
rate_limit:
  enabled: true
  auth_per_minute: 20
  llm_per_minute: 5
  general_per_min: 100
