<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            
            inputs.forEach(input => {
                // Focus styling handled by Tailwind focus: classes
                
                // Simple placeholder animation feel
                input.addEventListener('focus', () => {
                    input.parentElement.classList.add('scale-[1.01]');
                });
                
                input.addEventListener('blur', () => {
                    input.parentElement.classList.remove('scale-[1.01]');
                });
            });

            // Password visibility toggle simulation
            const togglePass = document.querySelector('button[type="button"]');
            const passInput = document.getElementById('password');
            let isVisible = false;

            if (togglePass && passInput) {
                togglePass.addEventListener('click', () => {
                    isVisible = !isVisible;
                    passInput.type = isVisible ? 'text' : 'password';
                    togglePass.querySelector('span').textContent = isVisible ? 'visibility_off' : 'visibility';
                });
            }
        });
    </script>
