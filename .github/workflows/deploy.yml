name: Deploy to VPS

# Runs on merge to main (a merged PR pushes a commit to main).
# Also allows a manual run from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # Never run two deploys at once; cancel an in-progress one if a newer
  # commit lands on main.
  group: deploy-production
  cancel-in-progress: false

jobs:
  test-backend:
    name: Backend Build + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Build + test
        working-directory: backend
        run: |
          go build ./...
          go test ./...

  test-frontend:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install + lint + build
        working-directory: frontend
        run: |
          npm install
          npm run lint
          npm run build

  build-and-push-images:
    name: Build and Push Docker Images
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/jhontea/navisha-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/jhontea/navisha-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'https://api.navisha.cloud/api/v1' }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY || '' }}
            NEXT_PUBLIC_LOCATION_PROVIDER=${{ vars.NEXT_PUBLIC_LOCATION_PROVIDER || 'geoapify' }}
            NEXT_PUBLIC_MAP_PROVIDER=${{ vars.NEXT_PUBLIC_MAP_PROVIDER || 'maplibre' }}
            NEXT_PUBLIC_LOCATION_PHOTOS_ENABLED=${{ vars.NEXT_PUBLIC_LOCATION_PHOTOS_ENABLED || 'false' }}
            NEXT_PUBLIC_MAP_TILE_URL=${{ vars.NEXT_PUBLIC_MAP_TILE_URL || '/api/map-tiles/{z}/{x}/{y}' }}
            NEXT_PUBLIC_MAP_ATTRIBUTION=${{ vars.NEXT_PUBLIC_MAP_ATTRIBUTION || 'OpenStreetMap contributors CARTO' }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy
    needs: [build-and-push-images]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          envs: IMAGE_TAG
          command_timeout: 30m
          # Stop on first error, fail on unset vars, fail piped commands.
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/navisha

            echo "==> Pulling latest code"
            git fetch --prune origin main
            git reset --hard origin/main

            echo "==> Logging in to GitHub Container Registry"
            if [ ! -f /opt/navisha/.env.deploy ]; then
              echo "Missing /opt/navisha/.env.deploy"
              exit 1
            fi
            set -a
            source /opt/navisha/.env.deploy
            set +a
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            echo "==> Pulling pre-built images"
            docker compose -f docker-compose.prod.yml pull

            echo "==> Restarting containers without building"
            docker compose -f docker-compose.prod.yml up -d --no-build

            echo "==> Pruning dangling images"
            docker image prune -f

            echo "==> Deployed containers:"
            docker compose -f docker-compose.prod.yml ps
